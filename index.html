<!DOCTYPE html>
<html lang="ru">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>rubinv</title>
    <link rel="stylesheet" href="style.css?v=4">
</head>
<body>

    <div id="combo-flash-overlay" class="combo-flash-overlay"></div>
    <div class="fog-container">
        <div class="fog-layer"></div>
    </div>

    <button id="settings-toggle-btn" class="settings-toggle-btn">⚙️</button>

    <button id="game-toggle-btn" class="game-toggle-btn">🎮 Play mania</button>

    <div id="settings-sidebar" class="settings-sidebar">
        <div class="settings-header">
            <h3>Settings</h3>
            <button id="settings-close-x" class="settings-close-x">×</button>
        </div>
        <div class="settings-body">
            <div class="setting-item">
                <label for="volume-master">Music Volume: <span id="val-volume-master">100%</span></label>
                <input type="range" id="volume-master" min="0" max="100" value="100">
            </div>
            
            <div class="setting-item">
                <label for="volume-effects">Effects Volume: <span id="val-volume-effects">100%</span></label>
                <input type="range" id="volume-effects" min="0" max="100" value="100">
            </div>

            <div class="setting-item">
                <label for="audio-offset">Audio Offset: <span id="val-audio-offset">0 ms</span></label>
                <div class="offset-control">
                    <input type="range" id="audio-offset" min="-200" max="200" value="0" step="5">
                </div>
                <small class="setting-hint">Сдвиг нот при рассинхронизации</small>
            </div>

           <div class="setting-item">
    <label>Custom Background</label>
    <!-- Прямой инпут, стилизованный под кнопку -->
    <input type="file" id="bg-uploader" accept="image/*" class="osu-btn" style="border: none; background: #2e2a36; padding: 8px; font-size: 0.9rem; cursor: pointer;">
    <button type="button" id="bg-reset-btn" class="osu-btn" style="margin-top: 8px; padding: 6px; font-size: 0.8rem; border: none; color: #ff4444; background: transparent;">Reset Background</button>
</div>
        </div>
    </div>

    <div id="game-sidebar" class="game-sidebar">
        <div class="game-sidebar-header">
            <button id="game-close-x" class="settings-close-x">×</button>
            
            <div class="size-controls">
                <button id="size-decrease-btn" title="Уменьшить">🔍-</button>
                <button id="size-reset-btn" title="Сбросить">100%</button>
                <button id="size-increase-btn" title="Увеличить">🔍+</button>
            </div>
        </div>

        <div class="game-container" id="resizable-game">
            <div class="game-info">
                <div class="score-box">Score: <span id="score">000000</span></div>
                <div class="combo-box">Combo: <span id="combo">0</span></div>
            </div>
            
            <div class="difficulty-selector">
                <label for="diff">Difficulty: </label>
                <select id="diff">
                    <option value="easy">Easy</option>
                    <option value="normal" selected>Normal</option>
                    <option value="hard">Hard</option>
                </select>
            </div>
            
            <div class="mania-board">
                <canvas id="visualizer-canvas" class="visualizer-canvas"></canvas>

                <div class="lane" id="lane-0"></div>
                <div class="lane" id="lane-1"></div>
                <div class="lane" id="lane-2"></div>
                <div class="lane" id="lane-3"></div>
                
                <div class="hit-zone">
                    <div class="key-hint" id="key-0" data-lane="0"><span>D</span></div>
                    <div class="key-hint" id="key-1" data-lane="1"><span>F</span></div>
                    <div class="key-hint" id="key-2" data-lane="2"><span>J</span></div>
                    <div class="key-hint" id="key-3" data-lane="3"><span>K</span></div>
                </div>
                
                <div id="hit-rating" class="hit-rating"></div>

                <div id="result-screen" class="result-screen" style="display: none;">
                    <h2 class="result-title">RESULTS</h2>
                    <div class="result-rank" id="res-rank">A</div>
                    <div class="result-stats">
                        <p>Score: <span id="res-score">000000</span></p>
                        <p>Max Combo: <span id="res-combo">0</span></p>
                        <p>Accuracy: <span id="res-acc">0%</span></p>
                    </div>
                    <button id="result-close-btn" class="result-close-btn">Back</button>
                </div>
            </div>
            
            <div class="game-controls">
                <button id="start-game-btn">Start Game</button>
                <button id="pause-game-btn" style="display: none;">Pause</button>
                <button id="reset-game-btn" style="display: none;">Reset</button>
            </div>
        </div>
    </div>

    <div class="main-layout">
        <div class="profile-container">
            <div class="avatar-wrapper">
                <img src="https://i.imgur.com/qHBMFD6.gif" alt="Avatar" class="osu-avatar">
            </div>
            <h1 class="osu-username">rubinv</h1>
            <p class="osu-status">Click the tiles! 🌟</p>
            <div class="osu-links">
                <a href="https://github.com/itzrubinv" target="_blank" class="osu-btn github">
                    <span class="btn-icon">🐙</span> GitHub
                </a>
                <a href="https://t.me/rubinv" target="_blank" class="osu-btn telegram">
                    <span class="btn-icon">✈️</span> Telegram
                </a>
            </div>
        </div>
    </div>

    <audio id="game-music" src="voice.mp3" preload="auto"></audio>
    <audio id="hit-sound" src="hit.mp3" preload="auto"></audio>
    <audio id="miss-sound" src="miss.mp3" preload="auto"></audio>

    <script src="game.js?v=5"></script>
</body>
