<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rubinv</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="combo-flash-overlay" class="combo-flash-overlay"></div>
    <div class="fog-container">
        <div class="fog-layer"></div>
    </div>

    <div class="main-layout">
        
        <div class="game-container">
            
            <button id="settings-toggle-btn" class="settings-toggle-btn" onclick="toggleSettings()">⚙️</button>

            <div id="settings-sidebar" class="settings-sidebar">
                <div class="settings-header">
                    <h3>Settings</h3>
                    <button class="settings-close-x" onclick="toggleSettings()">×</button>
                </div>
                <div class="settings-body">
                    <div class="setting-item">
                        <label for="volume-master">Music Volume: <span id="val-volume-master">100%</span></label>
                        <input type="range" id="volume-master" min="0" max="100" value="100" oninput="updateVolumeSettings()">
                    </div>
                    
                    <div class="setting-item">
                        <label for="volume-effects">Effects Volume: <span id="val-volume-effects">100%</span></label>
                        <input type="range" id="volume-effects" min="0" max="100" value="100" oninput="updateVolumeSettings()">
                    </div>

                    <div class="setting-item">
                        <label for="audio-offset">Audio Offset: <span id="val-audio-offset">0 ms</span></label>
                        <div class="offset-control">
                            <input type="range" id="audio-offset" min="-200" max="200" value="0" step="5" oninput="updateVolumeSettings()">
                        </div>
                        <small class="setting-hint">Сдвиг нот, если звук отстает</small>
                    </div>
                </div>
            </div>

            <div class="game-info">
                <div class="score-box">Score: <span id="score">000000</span></div>
                <div class="combo-box">Combo: <span id="combo">0</span></div>
            </div>
            
            <div class="difficulty-selector">
                <label for="diff">Difficulty: </label>
                <select id="diff" onchange="changeDifficulty()">
                    <option value="easy">Easy</option>
                    <option value="normal" selected>Normal</option>
                    <option value="hard">Hard</option>
                </select>
            </div>
            
            <div class="mania-board">
                <canvas id="visualizer-canvas" class="visualizer-canvas"></canvas>

                <div class="lane" id="lane-0"></div>
                <div class="lane" id="lane-1"></div>
                <div class="lane" id="lane-2"></div>
                <div class="lane" id="lane-3"></div>
                
                <div class="hit-zone">
                    <div class="key-hint" id="key-0">D</div>
                    <div class="key-hint" id="key-1">F</div>
                    <div class="key-hint" id="key-2">J</div>
                    <div class="key-hint" id="key-3">K</div>
                </div>
                
                <div id="hit-rating" class="hit-rating"></div>

                <div id="result-screen" class="result-screen" style="display: none;">
                    <h2 class="result-title">RESULTS</h2>
                    <div class="result-rank" id="res-rank">A</div>
                    <div class="result-stats">
                        <p>Score: <span id="res-score">000000</span></p>
                        <p>Max Combo: <span id="res-combo">0</span></p>
                        <p>Accuracy: <span id="res-acc">0%</span></p>
                    </div>
                    <button class="result-close-btn" onclick="closeResults()">Back</button>
                </div>
            </div>
            
            <div class="game-controls">
                <button id="start-game-btn" onclick="startManiaGame()">Start Game</button>
                <button id="pause-game-btn" onclick="togglePauseGame()" style="display: none;">Pause</button>
                <button id="reset-game-btn" onclick="resetManiaGame()" style="display: none;">Reset</button>
            </div>
        </div>

        <div class="profile-container">
            <div class="avatar-wrapper">
                <img src="https://i.imgur.com/qHBMFD6.gif" alt="Avatar" class="osu-avatar">
            </div>
            <h1 class="osu-username">rubinv</h1>
            <p class="osu-status">Click the tiles! 🌟</p>
            <div class="osu-links">
                <a href="https://github.com/itzrubinv" target="_blank" class="osu-btn github">
                    <span class="btn-icon">🐙</span> GitHub
                </a>
                <a href="https://t.me/rubinv" target="_blank" class="osu-btn telegram">
                    <span class="btn-icon">✈️</span> Telegram
                </a>
            </div>
        </div>

    </div>

    <audio id="game-music" src="voice.mp3" preload="auto"></audio>
    <audio id="hit-sound" src="hit.mp3" preload="auto"></audio>
    <audio id="miss-sound" src="miss.mp3" preload="auto"></audio>

    <script src="game.js"></script>
</body>
</html>
